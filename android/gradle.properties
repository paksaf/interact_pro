org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Auto-translate legacy `android.support.*` classes in plugin AARs to
# `androidx.*` equivalents at build time. Required because some plugins
# (ar_flutter_plugin 0.7.3 in particular) were published against the
# pre-AndroidX support library. Without this, AGP fails with
# "Duplicate class android.support.v4.app.INotificationSideChannel"
# and friends.
android.enableJetifier=true
